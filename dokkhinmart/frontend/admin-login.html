<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow w-full max-w-md">
  <h1 class="text-3xl font-bold text-center mb-6">Admin Login</h1>

  <form id="loginForm" class="space-y-4">
    <input id="email" type="email" placeholder="Email"
      class="w-full border p-3 rounded-xl" required>

    <input id="password" type="password" placeholder="Password"
      class="w-full border p-3 rounded-xl" required>

    <button class="w-full bg-black text-white p-3 rounded-xl">
      Login
    </button>
  </form>

  <p id="msg" class="mt-4 text-center text-sm text-red-500"></p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if(email === 'admin@dokkhinmart.com' && password === 'admin123'){
    localStorage.setItem('adminLoggedIn', 'true');
    window.location.href = '/admin';
  } else {
    document.getElementById('msg').innerText = 'Invalid credentials';
  }
});
</script>

</body>
</html>
