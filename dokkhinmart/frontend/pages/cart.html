<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dokkhinmart.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Cart – DOKKHINMART</title>

</head>
<body>
<div id="navbar-root"></div>
<div id="cart-root"></div>

<div class="page-header">
  <div class="container">
    <h1>Shopping Cart</h1>
    <div class="breadcrumb"><a href="../index.html">Home</a><span>›</span><span>Cart</span></div>
  </div>
</div>

<div class="container">
  <div id="cart-page-content"></div>
</div>

<div id="footer-root"></div>

<script>
  renderNavbar('cart', '..');
  renderCartSidebar('../pages/checkout.html');
  renderFooter('..');

  function renderCartPage() {
    const el = document.getElementById('cart-page-content');
    if (!state.cart.length) {
      el.innerHTML = `<div class="empty-state" style="padding:100px 20px;">
        <span class="empty-state-icon">🛒</span>
        <h3>Your cart is empty</h3>
        <p>Add some fresh products to your cart.</p>
        <a href="shop.html" class="btn btn-primary" style="margin-top:24px;">Browse Products</a>
      </div>`;
      return;
    }

    const subtotal = getCartTotalRaw();
    const delivery = subtotal >= 1000 ? 0 : 50;
    const total    = subtotal + delivery;

    el.innerHTML = `
    <div class="cart-layout">
      <div>
        <div class="cart-table">
          <table>
            <thead>
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cart-page-rows"></tbody>
          </table>
        </div>
        <div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;">
          <a href="shop.html" class="btn btn-ghost">← Continue Shopping</a>
          <button class="btn btn-danger" onclick="clearCart()">🗑 Clear Cart</button>
        </div>
      </div>
      <div class="order-summary-box">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span>৳${subtotal.toLocaleString()}</span></div>
        <div class="summary-row"><span>Delivery</span><span>${delivery === 0 ? '<span style="color:var(--green-mid);font-weight:700;">FREE</span>' : `৳${delivery}`}</span></div>
        ${subtotal < 1000 ? `<p style="font-size:12px;color:var(--text-light);margin:-4px 0 8px;">Add ৳${(1000-subtotal).toLocaleString()} more for free delivery</p>` : ''}
        <div class="coupon-form">
          <input type="text" id="coupon-input" placeholder="Coupon code">
          <button class="btn btn-outline btn-sm" onclick="applyCoupon()">Apply</button>
        </div>
        <div class="summary-row total"><span>Total</span><span>৳${total.toLocaleString()}</span></div>
        <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top:16px;">Proceed to Checkout →</a>
        <p style="font-size:12px;color:var(--text-light);text-align:center;margin-top:10px;">Secure checkout · Cash on Delivery available</p>
      </div>
    </div>`;

    renderCartRows();
  }

  function renderCartRows() {
    const tbody = document.getElementById('cart-page-rows');
    if (!tbody) return;
    tbody.innerHTML = state.cart.map(item => {
      const price = Number(item.sale_price) || Number(item.price);
      return `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:14px;">
            <div class="cart-page-item-img">${getProductEmoji(item.name)}</div>
            <div>
              <div style="font-weight:600;font-size:14px;color:var(--text-dark);">${item.name}</div>
              <div style="font-size:12px;color:var(--text-light);">${item.unit || 'kg'}</div>
            </div>
          </div>
        </td>
        <td style="font-weight:600;color:var(--green-dark);">৳${price.toLocaleString()}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="qty-btn" onclick="cartPageUpdateQty(${item.id},-1)">−</button>
            <span class="qty-val">${item.quantity}</span>
            <button class="qty-btn" onclick="cartPageUpdateQty(${item.id},1)">+</button>
          </div>
        </td>
        <td style="font-weight:700;color:var(--green-dark);">৳${(price * item.quantity).toLocaleString()}</td>
        <td><button class="action-delete" onclick="cartPageRemove(${item.id})">Remove</button></td>
      </tr>`;
    }).join('');
  }

  function cartPageUpdateQty(id, delta) {
    const item = state.cart.find(i => i.id == id);
    if (!item) return;
    item.quantity = Math.max(1, item.quantity + delta);
    saveCart(); renderCartPage();
  }

  function cartPageRemove(id) {
    state.cart = state.cart.filter(i => i.id != id);
    saveCart(); renderCartPage();
  }

  function clearCart() {
    if (!confirm('Clear all items from cart?')) return;
    state.cart = [];
    saveCart(); renderCartPage();
  }

  function applyCoupon() {
    const code = document.getElementById('coupon-input').value.trim().toUpperCase();
    if (!code) return;
    toast('Checking coupon...', 'info');
    apiCall(`/coupons/validate`, 'POST', { code, amount: getCartTotalRaw() }).then(data => {
      if (data.success) toast(`Coupon applied! You save ৳${data.discount}`);
      else toast(data.message || 'Invalid coupon', 'error');
    });
  }

  renderCartPage();
</script>
<script src="../main.js"></script>
</body>
</html>
