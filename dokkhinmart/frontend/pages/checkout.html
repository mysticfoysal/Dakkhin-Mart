<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dokkhinmart.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Checkout – DOKKHINMART</title>

</head>
<body>
<div id="navbar-root"></div>
<div id="cart-root"></div>

<div class="page-header">
  <div class="container">
    <h1>Checkout</h1>
    <div class="breadcrumb"><a href="../index.html">Home</a><span>›</span><a href="cart.html">Cart</a><span>›</span><span>Checkout</span></div>
  </div>
</div>

<div class="container">
  <div id="checkout-body"></div>
</div>

<div id="footer-root"></div>

<script>
  renderNavbar('checkout', '..');
  renderCartSidebar('../pages/checkout.html');
  renderFooter('..');

  let selectedDelivery = '24h';
  let selectedPayment  = 'cod';

  function renderCheckout() {
    const el = document.getElementById('checkout-body');
    if (!state.cart.length) {
      el.innerHTML = `<div class="empty-state"><span class="empty-state-icon">🛒</span><h3>Your cart is empty</h3><a href="shop.html" class="btn btn-primary" style="margin-top:20px;">Go Shopping</a></div>`;
      return;
    }

    const subtotal = getCartTotalRaw();
    const delivery = selectedDelivery === '12h' ? 80 : (subtotal >= 1000 ? 0 : 50);
    const total    = subtotal + delivery;

    el.innerHTML = `
    <div class="checkout-grid">
      <!-- FORM -->
      <div>
        <div class="checkout-form-card">
          <h3>📋 Delivery Information</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <input type="text" class="form-input" id="co-name" placeholder="Your full name" value="${state.user?.name||''}">
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number *</label>
              <input type="tel" class="form-input" id="co-phone" placeholder="+880 17..." value="${state.user?.phone||''}">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email (optional)</label>
            <input type="email" class="form-input" id="co-email" placeholder="your@email.com" value="${state.user?.email||''}">
          </div>
          <div class="form-group">
            <label class="form-label">Delivery Address *</label>
            <textarea class="form-textarea" id="co-address" rows="3" placeholder="House, Road, Area, City...">${state.user?.address||''}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Order Notes (optional)</label>
            <textarea class="form-textarea" id="co-notes" rows="2" placeholder="Any special instructions..."></textarea>
          </div>
        </div>

        <div class="checkout-form-card">
          <h3>🚚 Delivery Option</h3>
          <div class="delivery-type-opts">
            <div class="delivery-type-opt ${selectedDelivery==='12h'?'selected':''}" onclick="selectDelivery('12h')">
              <div class="opt-icon">⚡</div>
              <h4>Quick 12-Hour</h4>
              <p>Before 6:30 AM or 6:30 PM</p>
              <strong style="color:var(--green-mid);font-size:13px;">৳80</strong>
            </div>
            <div class="delivery-type-opt ${selectedDelivery==='24h'?'selected':''}" onclick="selectDelivery('24h')">
              <div class="opt-icon">🚚</div>
              <h4>Standard 24-Hour</h4>
              <p>Any time, delivered next day</p>
              <strong style="color:var(--green-mid);font-size:13px;">${subtotal>=1000?'FREE':'৳50'}</strong>
            </div>
          </div>
        </div>

        <div class="checkout-form-card">
          <h3>💳 Payment Method</h3>
          <div class="payment-options">
            <div class="payment-opt ${selectedPayment==='cod'?'selected':''}" onclick="selectPayment('cod')">
              <span class="pay-icon">💵</span><span>Cash on Delivery</span>
            </div>
            <div class="payment-opt ${selectedPayment==='bkash'?'selected':''}" onclick="selectPayment('bkash')">
              <span class="pay-icon">📱</span><span>bKash</span>
            </div>
            <div class="payment-opt ${selectedPayment==='nagad'?'selected':''}" onclick="selectPayment('nagad')">
              <span class="pay-icon">📱</span><span>Nagad</span>
            </div>
            <div class="payment-opt ${selectedPayment==='card'?'selected':''}" onclick="selectPayment('card')">
              <span class="pay-icon">💳</span><span>Card Payment</span>
            </div>
          </div>
          ${selectedPayment==='bkash' ? '<p style="font-size:13px;color:var(--text-mid);margin-top:12px;background:var(--green-pale);padding:12px;border-radius:8px;">Send to bKash: <strong>01700-000000</strong> and enter transaction ID below.<br><input type="text" class="form-input" style="margin-top:8px;" placeholder="bKash Transaction ID" id="txn-id"></p>' : ''}
          ${selectedPayment==='nagad' ? '<p style="font-size:13px;color:var(--text-mid);margin-top:12px;background:var(--green-pale);padding:12px;border-radius:8px;">Send to Nagad: <strong>01700-000000</strong> and enter transaction ID below.<br><input type="text" class="form-input" style="margin-top:8px;" placeholder="Nagad Transaction ID" id="txn-id"></p>' : ''}
        </div>
      </div>

      <!-- ORDER SUMMARY -->
      <div class="order-summary-box">
        <h3>Order Summary</h3>
        <div style="margin-bottom:16px;max-height:300px;overflow-y:auto;">
          ${state.cart.map(item => {
            const price = Number(item.sale_price)||Number(item.price);
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;">
              <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:20px;">${getProductEmoji(item.name)}</span><div><div style="font-weight:600;color:var(--text-dark);">${item.name}</div><div style="font-size:12px;color:var(--text-light);">× ${item.quantity}</div></div></div>
              <span style="font-weight:700;color:var(--green-dark);">৳${(price*item.quantity).toLocaleString()}</span>
            </div>`;
          }).join('')}
        </div>
        <div class="summary-row"><span>Subtotal</span><span>৳${subtotal.toLocaleString()}</span></div>
        <div class="summary-row"><span>Delivery (${selectedDelivery==='12h'?'12h':'24h'})</span><span>${delivery===0?'<span style="color:var(--green-mid);font-weight:700;">FREE</span>':`৳${delivery}`}</span></div>
        <div class="summary-row total"><span>Total</span><span>৳${total.toLocaleString()}</span></div>
        <button class="btn btn-primary btn-block" style="margin-top:20px;font-size:16px;" onclick="placeOrder()">
          Place Order ৳${total.toLocaleString()} →
        </button>
        <p style="font-size:12px;color:var(--text-light);text-align:center;margin-top:10px;">By placing order you agree to our terms</p>
        <a href="https://wa.me/8801700000000?text=Hi, I want to place an order" class="whatsapp-btn" target="_blank" style="margin-top:12px;width:100%;justify-content:center;">
          💬 Order via WhatsApp
        </a>
      </div>
    </div>`;
  }

  function selectDelivery(type) {
    selectedDelivery = type;
    renderCheckout();
  }
  function selectPayment(method) {
    selectedPayment = method;
    renderCheckout();
  }

  async function placeOrder() {
    const name    = document.getElementById('co-name')?.value?.trim();
    const phone   = document.getElementById('co-phone')?.value?.trim();
    const address = document.getElementById('co-address')?.value?.trim();

    if (!name)    { toast('Please enter your name', 'error'); return; }
    if (!phone)   { toast('Please enter your phone number', 'error'); return; }
    if (!address) { toast('Please enter your delivery address', 'error'); return; }

    const subtotal = getCartTotalRaw();
    const delivery = selectedDelivery === '12h' ? 80 : (subtotal >= 1000 ? 0 : 50);
    const total    = subtotal + delivery;

    const orderData = {
      customer_name:    name,
      customer_phone:   phone,
      customer_email:   document.getElementById('co-email')?.value?.trim() || '',
      delivery_address: address,
      notes:            document.getElementById('co-notes')?.value?.trim() || '',
      delivery_type:    selectedDelivery,
      delivery_charge:  delivery,
      subtotal,
      total,
      payment_method:   selectedPayment,
      items: state.cart.map(i => ({
        product_id:   i.id,
        product_name: i.name,
        quantity:     i.quantity,
        unit_price:   Number(i.sale_price) || Number(i.price),
        total_price:  (Number(i.sale_price) || Number(i.price)) * i.quantity,
        unit:         i.unit,
      })),
    };

    const btn = document.querySelector('button[onclick="placeOrder()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Placing Order...'; }

    const data = await apiCall('/orders', 'POST', orderData);

    if (data.success) {
      state.cart = [];
      saveCart();
      toast(`Order #${data.order_number} placed successfully! 🎉`);
      setTimeout(() => {
        window.location.href = `order-success.html?order=${data.order_number}`;
      }, 1500);
    } else {
      toast(data.message || 'Failed to place order. Please try again.', 'error');
      if (btn) { btn.disabled = false; btn.textContent = `Place Order ৳${total.toLocaleString()} →`; }
    }
  }

  renderCheckout();
</script>
<script src="../main.js"></script>
</body>
</html>
