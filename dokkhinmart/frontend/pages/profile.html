<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dokkhinmart.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>My Account – DOKKHINMART</title>

</head>
<body>
<div id="navbar-root"></div>
<div id="cart-root"></div>

<div class="page-hero">
  <div class="container">
    <h1>👤 My Account</h1>
    <p>Manage your profile and track your orders</p>
  </div>
</div>

<div class="container">
  <div class="profile-layout">
    <aside class="profile-sidebar">
      <div class="profile-card">
        <div class="profile-avatar-section">
          <div class="profile-avatar" id="p-avatar">👤</div>
          <div class="profile-name" id="p-name">Loading...</div>
          <div class="profile-email" id="p-email">-</div>
        </div>
        <ul class="profile-nav">
          <li class="active" id="nav-orders"><a href="#" onclick="showSection('orders');return false;"><span>📦</span> My Orders</a></li>
          <li id="nav-profile"><a href="#" onclick="showSection('profile');return false;"><span>✏️</span> Edit Profile</a></li>
          <li id="nav-password"><a href="#" onclick="showSection('password');return false;"><span>🔒</span> Change Password</a></li>
          <li id="nav-wishlist"><a href="wishlist.html"><span>❤️</span> Wishlist (${state.wishlist.length})</a></li>
          <li><button onclick="logout()"><span>🚪</span> Logout</button></li>
        </ul>
      </div>
    </aside>

    <main class="profile-content">
      <!-- ORDERS SECTION -->
      <div id="section-orders">
        <h3>📦 My Orders</h3>
        <div id="orders-list" class="orders-list">
          <div class="loading-center"><div class="loading-spinner"></div></div>
        </div>
      </div>

      <!-- EDIT PROFILE SECTION -->
      <div id="section-profile" style="display:none;">
        <h3>✏️ Edit Profile</h3>
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="edit-name" placeholder="Your name"></div>
        <div class="form-group"><label class="form-label">Phone Number</label><input class="form-input" id="edit-phone" placeholder="+880..."></div>
        <div class="form-group"><label class="form-label">Delivery Address</label><textarea class="form-input" id="edit-address" placeholder="Default delivery address"></textarea></div>
        <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
      </div>

      <!-- CHANGE PASSWORD SECTION -->
      <div id="section-password" style="display:none;">
        <h3>🔒 Change Password</h3>
        <div class="form-group"><label class="form-label">Current Password</label><input class="form-input" type="password" id="curr-pass"></div>
        <div class="form-group"><label class="form-label">New Password</label><input class="form-input" type="password" id="new-pass"></div>
        <div class="form-group"><label class="form-label">Confirm New Password</label><input class="form-input" type="password" id="confirm-pass"></div>
        <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
      </div>
    </main>
  </div>
</div>

<div id="footer-root"></div>

<script>
document.getElementById('navbar-root').innerHTML = renderNavbar('');
document.getElementById('cart-root').innerHTML = renderCartSidebar();
document.getElementById('footer-root').innerHTML = renderFooter();

if (!isLoggedIn()) { window.location.href = 'auth.html'; }

function showSection(name) {
  ['orders','profile','password'].forEach(s => {
    document.getElementById(`section-${s}`).style.display = s === name ? 'block' : 'none';
    document.getElementById(`nav-${s}`)?.classList.toggle('active', s === name);
  });
}

async function loadProfile() {
  const data = await apiCall('/auth/profile');
  if (!data.success) return;
  const u = data.user;
  document.getElementById('p-name').textContent = u.name;
  document.getElementById('p-email').textContent = u.email;
  document.getElementById('p-avatar').textContent = u.name?.[0]?.toUpperCase() || '👤';
  document.getElementById('edit-name').value = u.name || '';
  document.getElementById('edit-phone').value = u.phone || '';
  document.getElementById('edit-address').value = u.address || '';
}

async function loadOrders() {
  const data = await apiCall('/auth/orders');
  const el = document.getElementById('orders-list');
  if (!data.success || !data.orders?.length) {
    el.innerHTML = `<div style="text-align:center;padding:60px;"><div style="font-size:60px;margin-bottom:16px;">📦</div><h3>No orders yet</h3><p style="color:var(--text-light)">Your order history will appear here</p><a href="shop.html" class="btn btn-primary" style="margin-top:20px;display:inline-flex;">Start Shopping →</a></div>`;
    return;
  }
  el.innerHTML = data.orders.map(o => {
    const items = typeof o.items === 'string' ? JSON.parse(o.items || '[]') : (o.items || []);
    return `
    <div class="order-card">
      <div class="order-card-header">
        <div>
          <div class="order-num">#${o.order_number}</div>
          <div class="order-date">${new Date(o.created_at).toLocaleDateString('en-BD', { year:'numeric',month:'long',day:'numeric' })}</div>
        </div>
        <span class="status-badge status-${o.order_status}">${o.order_status.replace(/_/g,' ')}</span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
        ${items.slice(0,3).map(i => `<div style="background:var(--cream);border-radius:8px;padding:8px 12px;font-size:13px;"><strong>${i.name || i.product_name}</strong> × ${i.qty || i.quantity}</div>`).join('')}
        ${items.length > 3 ? `<div style="background:var(--cream);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text-light)">+${items.length-3} more</div>` : ''}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div style="font-size:15px;"><span style="color:var(--text-mid)">Total:</span> <strong style="color:var(--green-dark);font-size:18px;">৳${Number(o.total).toLocaleString()}</strong></div>
        <div style="display:flex;gap:8px;">
          <span style="font-size:13px;color:var(--text-light)">💳 ${o.payment_method.toUpperCase()} · ${o.delivery_type === '12h' ? '⚡ Express' : '🚚 Standard'}</span>
        </div>
      </div>
      ${o.tracking_notes ? `<div style="margin-top:12px;padding:10px 14px;background:var(--green-pale);border-radius:8px;font-size:13px;color:var(--green-dark);">📍 ${o.tracking_notes}</div>` : ''}
    </div>`;
  }).join('');
}

async function saveProfile() {
  const name = document.getElementById('edit-name').value;
  const phone = document.getElementById('edit-phone').value;
  const address = document.getElementById('edit-address').value;
  const data = await apiCall('/auth/profile', 'PUT', { name, phone, address });
  if (data.success) { toast('Profile updated ✅'); if (state.user) { state.user.name = name; saveUser(); } loadProfile(); }
  else toast(data.message || 'Update failed', 'error');
}

async function changePassword() {
  const currentPassword = document.getElementById('curr-pass').value;
  const newPassword = document.getElementById('new-pass').value;
  const confirm = document.getElementById('confirm-pass').value;
  if (!currentPassword || !newPassword) { toast('Fill all fields', 'warning'); return; }
  if (newPassword !== confirm) { toast('Passwords do not match', 'error'); return; }
  if (newPassword.length < 6) { toast('Password too short', 'warning'); return; }
  const data = await apiCall('/auth/change-password', 'PUT', { currentPassword, newPassword });
  if (data.success) { toast('Password changed ✅'); document.getElementById('curr-pass').value=''; document.getElementById('new-pass').value=''; document.getElementById('confirm-pass').value=''; }
  else toast(data.message || 'Failed', 'error');
}

loadProfile();
loadOrders();
</script>
<script src="../main.js"></script>
</body>
</html>
